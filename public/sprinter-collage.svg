<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="white" font-family="Arial" font-size="24" font-weight="bold" opacity="0.9">
    GAMEPLAY HIGHLIGHTS
  </text>
  
  <!-- === Card 1: Sprint Race === -->
  <rect x="20" y="65" width="240" height="155" rx="12" fill="#2c3e50" opacity="0.95"/>
  <!-- Mini race scene -->
  <rect x="35" y="80" width="210" height="50" rx="6" fill="#A0522D"/>
  <line x1="35" y1="105" x2="245" y2="105" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Stick runner -->
  <g stroke="white" stroke-width="2" fill="none" transform="translate(130, 95)">
    <circle cx="0" cy="-8" r="6" fill="#E74C3C"/>
    <line x1="0" y1="-2" x2="0" y2="10"/>
    <line x1="0" y1="2" x2="-6" y2="-4"/>
    <line x1="0" y1="2" x2="6" y2="-6"/>
    <line x1="0" y1="10" x2="-5" y2="18"/>
    <line x1="0" y1="10" x2="5" y2="19"/>
  </g>
  <text x="140" y="155" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">100m Sprint Race</text>
  <text x="140" y="172" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">Challenge 7 opponents</text>
  <text x="140" y="188" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">across multiple heats</text>
  <text x="140" y="207" text-anchor="middle" fill="#e74c3c" font-family="Arial" font-size="20">🏃</text>
  
  <!-- === Card 2: Rhythm === -->
  <rect x="280" y="65" width="240" height="155" rx="12" fill="#2c3e50" opacity="0.95"/>
  <!-- Rhythm visualization -->
  <g transform="translate(310, 100)">
    <rect x="0" y="10" width="15" height="25" rx="3" fill="#E74C3C"/>
    <rect x="20" y="0" width="15" height="35" rx="3" fill="#3498DB"/>
    <rect x="40" y="10" width="15" height="25" rx="3" fill="#E74C3C"/>
    <rect x="60" y="0" width="15" height="35" rx="3" fill="#3498DB"/>
    <rect x="80" y="10" width="15" height="25" rx="3" fill="#E74C3C"/>
    <rect x="100" y="0" width="15" height="35" rx="3" fill="#3498DB"/>
    <rect x="120" y="10" width="15" height="25" rx="3" fill="#E74C3C"/>
    <rect x="140" y="0" width="15" height="35" rx="3" fill="#3498DB"/>
    <rect x="160" y="10" width="15" height="25" rx="3" fill="#E74C3C"/>
  </g>
  <text x="400" y="155" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Rhythm Gameplay</text>
  <text x="400" y="172" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">Alternate ← → keys</text>
  <text x="400" y="188" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">Find your perfect tempo</text>
  <text x="400" y="207" text-anchor="middle" fill="#e74c3c" font-family="Arial" font-size="20">🎵</text>
  
  <!-- === Card 3: Levels === -->
  <rect x="540" y="65" width="240" height="155" rx="12" fill="#2c3e50" opacity="0.95"/>
  <!-- Level indicators -->
  <g transform="translate(570, 95)">
    <rect x="0" y="0" width="50" height="40" rx="6" fill="#E74C3C"/>
    <text x="25" y="26" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">L1</text>
    <rect x="60" y="0" width="50" height="40" rx="6" fill="#3498DB"/>
    <text x="85" y="26" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">L2</text>
    <rect x="120" y="0" width="50" height="40" rx="6" fill="#2ECC71"/>
    <text x="145" y="26" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">L3</text>
    <rect x="0" y="50" width="50" height="40" rx="6" fill="#F39C12"/>
    <text x="25" y="76" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">L4</text>
    <rect x="60" y="50" width="50" height="40" rx="6" fill="#9B59B6"/>
    <text x="85" y="76" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">L5</text>
    <rect x="120" y="50" width="50" height="40" rx="6" fill="#E91E63"/>
    <text x="145" y="76" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">L6</text>
  </g>
  <text x="660" y="155" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">12 Challenging Levels</text>
  <text x="660" y="172" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">Increasing difficulty</text>
  <text x="660" y="188" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">Unique track per level</text>
  <text x="660" y="207" text-anchor="middle" fill="#e74c3c" font-family="Arial" font-size="20">🏆</text>
  
  <!-- === Card 4: Soundtrack === -->
  <rect x="20" y="235" width="240" height="150" rx="12" fill="#2c3e50" opacity="0.95"/>
  <!-- Music notes visualization -->
  <g transform="translate(60, 275)">
    <text fill="#E74C3C" font-size="28">♪</text>
    <text x="30" fill="#3498DB" font-size="24">♫</text>
    <text x="55" fill="#2ECC71" font-size="32">♪</text>
    <text x="85" fill="#F39C12" font-size="22">♩</text>
    <text x="110" fill="#9B59B6" font-size="28">♬</text>
    <text x="140" fill="#E74C3C" font-size="24">♪</text>
  </g>
  <text x="140" y="325" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Funky Soundtrack</text>
  <text x="140" y="342" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">Each level has its own</text>
  <text x="140" y="358" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">unique background music</text>
  <text x="140" y="375" text-anchor="middle" fill="#e74c3c" font-family="Arial" font-size="20">🎶</text>
  
  <!-- === Card 5: No Download === -->
  <rect x="280" y="235" width="240" height="150" rx="12" fill="#2c3e50" opacity="0.95"/>
  <!-- Browser icon -->
  <text x="400" y="280" text-anchor="middle" fill="#3498DB" font-family="Arial" font-size="28">🌐</text>
  <text x="400" y="325" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Play in Browser</text>
  <text x="400" y="342" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">No downloads required</text>
  <text x="400" y="358" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">No account needed</text>
  <text x="400" y="375" text-anchor="middle" fill="#e74c3c" font-family="Arial" font-size="20">⚡</text>
  
  <!-- === Card 6: Classic === -->
  <rect x="540" y="235" width="240" height="150" rx="12" fill="#2c3e50" opacity="0.95"/>
  <!-- Trophy -->
  <text x="660" y="280" text-anchor="middle" fill="#F39C12" font-family="Arial" font-size="28">🏅</text>
  <text x="660" y="325" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Timeless Classic</text>
  <text x="660" y="342" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">Since 2006</text>
  <text x="660" y="358" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">8.9/10 community rating</text>
  <text x="660" y="375" text-anchor="middle" fill="#e74c3c" font-family="Arial" font-size="20">⭐</text>
</svg>